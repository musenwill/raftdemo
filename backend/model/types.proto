syntax = "proto3";

package model;

enum EntryType {
  Data = 0;
}

enum Role {
    None = 0;
    Dummy = 1;
    Follower = 2;
    Candidate = 3;
    Leader = 4;
}

message Entry {
    int32 version = 1;
    int64 id = 2;
    int64 term = 3;
    EntryType type = 4;
    bytes payload = 5;
    int32 payload_size = 6;
    uint32 checksum = 7;
}
